<!DOCTYPE html>
<html>
<head>
	<title>对象练习</title>
</head>
<body>

<p id="demo"></p>

<script type="text/javascript">
	
	var car = "Fiat";
// 对象也可以包含多个值用花括号 抱起来，可以控制多行 ，空格和换行不是必须的
	var car = {
		type:"Fiat",
		model:500,
		color:"white",
	};
document.getElementById("demo").innerHTML = 
car.color+ "" +car.model;
	
</script>

</body>
</html>
